<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TK · HYROX</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#0B1220;--card:#111C30;--brd:#1E3050;--ink:#F1F5FB;--ink2:#9FB2CC;--blue:#3B82F6;--green:#10B981;--red:#EF4444;--amber:#F59E0B}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;padding:14px;padding-bottom:40px}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.hdr h1{font-size:17px;font-weight:900;flex:1}
.day-btn{background:var(--card);border:1px solid var(--brd);color:var(--ink2);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:900;font-family:inherit}
.day-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.wave{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:12px;margin-bottom:10px;border-left:5px solid var(--blue)}
.wave .top{display:flex;align-items:center;gap:10px}
.wave .time{font-size:20px;font-weight:900;min-width:62px}
.wave .cat{font-size:12px;font-weight:900;border-radius:6px;padding:2px 8px;border:1px solid}
.wave .meta{flex:1;font-size:10px;color:var(--ink2);font-weight:700}
.go{background:linear-gradient(135deg,#059669,#10B981);color:#fff;border:none;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:900;font-family:inherit;min-width:88px}
.go:disabled{opacity:.35}
.cancel{background:none;border:1px solid var(--red);color:var(--red);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:800;font-family:inherit}
.chrono{font-size:30px;font-weight:900;color:var(--green);font-variant-numeric:tabular-nums;letter-spacing:1px}
.done{color:var(--ink2);font-size:13px;font-weight:900}
.aths{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.ath{background:#0B1626;border:1px solid var(--brd);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:800;color:var(--ink2)}
.empty{text-align:center;color:var(--ink2);padding:40px 10px;font-size:13px}
.foot{position:fixed;bottom:0;left:0;right:0;background:#0B1220E6;border-top:1px solid var(--brd);padding:6px 14px;font-size:10px;color:var(--ink2);font-weight:700;text-align:center;backdrop-filter:blur(6px)}

.hx-net{position:fixed;top:10px;right:10px;width:12px;height:12px;border-radius:50%;background:#EF4444;box-shadow:0 0 8px #EF4444AA;z-index:99;transition:all .3s}
.hx-net.on{background:#10B981;box-shadow:0 0 8px #10B98188}
</style>
</head>
<body>
<div class="hdr">
  <h1>⏱ TK · Chrono général</h1>
  <div id="tkclock" onclick="calibrateClock()" title="Heure officielle — clique pour caler sur le chrono pro" style="cursor:pointer;margin-left:auto;font-size:22px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:1px;color:var(--green,#16A34A);background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.25);border-radius:10px;padding:4px 12px;line-height:1">🕐 --:--:--</div>
  <button class="day-btn on" id="d1" onclick="setDay(1)">J1</button>
  <button class="day-btn" id="d2" onclick="setDay(2)">J2</button>
</div>
<div id="master" style="background:var(--card);border:2px solid var(--brd);border-radius:16px;padding:16px;text-align:center;margin-bottom:14px"></div>
<div id="dashboard-kpis"></div>
<div id="list"><div class="empty">Connexion…</div></div>
<div id="dashboard"></div>
<div class="foot" id="foot">—</div>

<script>
var FIREBASE_DB_URL='https://foc-2026-default-rtdb.europe-west1.firebasedatabase.app';
firebase.initializeApp({databaseURL:FIREBASE_DB_URL});
var db=firebase.database();
var R='hyrox/race';

var DAY=1, WAVES={}, CFG={}, OFFSET=0;
db.ref('.info/serverTimeOffset').on('value',function(s){ OFFSET=s.val()||0; });
var ADJ=0; // ★ calage manuel sur le chrono officiel (réglé depuis le TK, partagé via Firebase)
db.ref(R+'/clockAdj').on('value',function(s){ ADJ=parseInt(s.val(),10)||0; });
function now(){ return Date.now()+OFFSET+ADJ; }
// ★ Calage sur le chrono officiel (chrono pro) — partagé avec départ/arrivée/juge/live
function calibrateClock(){
  var cur=new Date(now());
  var curTxt=('0'+cur.getHours()).slice(-2)+':'+('0'+cur.getMinutes()).slice(-2)+':'+('0'+cur.getSeconds()).slice(-2);
  var v=prompt('🕐 CALAGE SUR LE CHRONO OFFICIEL\n\nRegarde le chrono pro, entre l\'heure qu\'il va afficher (HH:MM:SS) et valide PILE au moment où il passe à cette seconde.\n\nActuellement affiché ici : '+curTxt+(ADJ?('  (calage actuel : '+(ADJ>0?'+':'')+Math.round(ADJ/1000)+'s)'):'')+'\n\nTape 0 pour revenir à l\'heure serveur.', curTxt);
  if(v===null) return;
  v=String(v).trim();
  if(v==='0'){ db.ref(R+'/clockAdj').set(0); alert('✅ Calage retiré — retour à l\'heure serveur.'); return; }
  var m=v.match(/^(\d{1,2})[:hH](\d{2})(?:[:mM](\d{2}))?$/);
  if(!m){ alert('Format invalide. Exemple : 09:30:00'); return; }
  var base=new Date(Date.now()+OFFSET);
  var target=new Date(base.getFullYear(),base.getMonth(),base.getDate(),parseInt(m[1],10),parseInt(m[2],10),parseInt(m[3]||'0',10),0).getTime();
  var newAdj=target-(Date.now()+OFFSET);
  if(Math.abs(newAdj)>6*3600*1000){ alert('Écart supérieur à 6h — vérifie l\'heure saisie.'); return; }
  db.ref(R+'/clockAdj').set(newAdj);
  alert('✅ Horloge calée sur le chrono officiel ('+(newAdj>0?'+':'')+Math.round(newAdj/1000)+'s).\nToutes les apps (départ, arrivée, juges, live) utilisent maintenant cette heure.');
}

var TK={};
db.ref(R+'/tk').on('value',function(s){ TK=s.val()||{}; render(); });
function tkStart(){ return (TK[DAY]&&TK[DAY].startAt)||null; }
function startTK(){
  if(tkStart()){ return; }
  if(!confirm('▶️ Lancer le CHRONO GÉNÉRAL du Jour '+DAY+' ?\nIl tournera toute la journée, tous les départs se caleront dessus.')) return;
  db.ref(R+'/tk/'+DAY+'/startAt').set(firebase.database.ServerValue.TIMESTAMP);
}
function resetTK(){
  if(!confirm('⚠️ RESET du chrono général J'+DAY+' ?')) return;
  if(!confirm('Vraiment sûr ? Les départs déjà lancés perdent leur référence TK (leurs temps athlètes restent corrects).')) return;
  db.ref(R+'/tk/'+DAY+'/startAt').remove();
}
db.ref(R+'/config').on('value',function(s){ CFG=s.val()||{}; render();
  document.getElementById('foot').textContent=(CFG.nom||'HYROX')+' · intervalle '+(CFG.interval||10)+' min'; });
db.ref(R+'/waves').on('value',function(s){ WAVES=s.val()||{}; render(); });
// ── Données pour le tableau de bord (œil de Moscou) ──
var PROGRESS={}, STATIONS=[], BENS={}, PENALTIES={};
db.ref(R+'/progress').on('value',function(s){ PROGRESS=s.val()||{}; render(); });
db.ref(R+'/config/stations').on('value',function(s){ STATIONS=s.val()||[]; render(); });
db.ref('hyrox/benevoles').on('value',function(s){ BENS=s.val()||{}; render(); });
db.ref(R+'/penalties').on('value',function(s){ PENALTIES=s.val()||{}; render(); });
db.ref(R+'/judges').on('value',function(s){ window.JUDGES=s.val()||{}; render(); });

/* ── DÉPART AUTOMATIQUE — le TK est le MAÎTRE ──
   Surveille l'heure serveur (now, calé) et lance chaque vague à son heure planifiée,
   sans intervention. Visible ensuite sur le live. Ne dépend d'aucun autre appareil.
   Utilise schedAt si les dates J1/J2 sont saisies, sinon l'heure du jour depuis w.time. */
var _autoFired={};
function _schedForWave(w){
  if(w.schedAt) return w.schedAt;
  if(!w.time) return null;
  var p=String(w.time).split(':'); if(p.length<2) return null;
  var d=new Date(now());
  d.setHours(parseInt(p[0],10)||0, parseInt(p[1],10)||0, 0, 0);
  return d.getTime();
}
setInterval(function(){
  if(!CFG || !CFG.autoStart) return;
  var t=now();
  Object.keys(WAVES||{}).forEach(function(k){
    var w=WAVES[k]; if(!w || w.startAt) return;      // déjà lancée
    if(_autoFired[k]) return;
    var sched=_schedForWave(w); if(sched==null) return;
    if(t >= sched && (t - sched) < 10*60000){
      _autoFired[k]=true;
      // ★ La 1ère vague qui part lance aussi le CHRONO GÉNÉRAL du jour (s'il ne tourne pas déjà)
      var wDay=w.jour||1;
      if(!(TK[wDay]&&TK[wDay].startAt)){
        db.ref(R+'/tk/'+wDay+'/startAt').set(firebase.database.ServerValue.TIMESTAMP);
        try{ console.log('⏱ TK — chrono général J'+wDay+' lancé (1ère vague auto)'); }catch(e){}
      }
      db.ref(R+'/waves/'+k+'/startAt').set(firebase.database.ServerValue.TIMESTAMP);
      try{ console.log('🚀 TK — départ AUTO vague '+w.num+' ('+w.catNom+') à '+w.time); }catch(e){}
    }
  });
},200);

function setDay(d){ DAY=d;
  document.getElementById('d1').className='day-btn'+(d===1?' on':'');
  document.getElementById('d2').className='day-btn'+(d===2?' on':'');
  render(); }

function fmt(ms){
  if(ms<0) ms=0;
  var s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return (h?h+':':'')+('0'+m).slice(-2)+':'+('0'+sec).slice(-2);
}

function launch(key){
  var w=WAVES[key]; if(!w) return;
  if(!confirm('🚀 Lancer la vague '+w.num+' — '+w.catNom+' ('+w.time+') ?')) return;
  // ★ Lance le chrono général du jour s'il ne tourne pas encore
  var wDay=w.jour||DAY;
  if(!(TK[wDay]&&TK[wDay].startAt)){
    db.ref(R+'/tk/'+wDay+'/startAt').set(firebase.database.ServerValue.TIMESTAMP);
  }
  db.ref(R+'/waves/'+key+'/startAt').set(firebase.database.ServerValue.TIMESTAMP);
}
function cancelLaunch(key){
  var w=WAVES[key]; if(!w||!w.startAt) return;
  if(now()-w.startAt>15000){ alert('Annulation possible seulement dans les 15s après le départ.'); return; }
  if(confirm('Annuler le départ de la vague '+w.num+' ?')) db.ref(R+'/waves/'+key+'/startAt').remove();
}

function renderMaster(){
  var el=document.getElementById('master'); if(!el) return;
  var st=tkStart();
  el.innerHTML = st
    ? '<div style="font-size:10px;font-weight:900;color:var(--ink2);text-transform:uppercase;letter-spacing:1px">Chrono général · Jour '+DAY+'</div>'
      +'<div class="chrono" data-start="'+st+'" style="font-size:52px;display:block;margin:4px 0">'+fmt(now()-st)+'</div>'
      +'<button class="cancel" onclick="resetTK()">reset</button>'
    : '<div style="font-size:10px;font-weight:900;color:var(--ink2);text-transform:uppercase;letter-spacing:1px">Chrono général · Jour '+DAY+'</div>'
      +'<div style="font-size:36px;font-weight:900;color:var(--ink2);margin:4px 0">00:00:00</div>'
      +'<button class="go" onclick="startTK()" style="width:100%">▶️ LANCER LE CHRONO GÉNÉRAL</button>'
      +'<div style="font-size:10px;color:var(--ink2);font-weight:700;margin-top:6px">Aucun départ de vague possible avant.</div>';
}

// ── ŒIL DE MOSCOU : calcul des stats ──
function nStationsTot(){ return (STATIONS||[]).filter(function(s){return s.seg==='station';}).length; }
function teamState(id){
  var p=PROGRESS[id]; if(!p) return {done:0, finished:false, curSta:null};
  var sts=p.stations||{};
  var done=Object.keys(sts).filter(function(k){return sts[k]&&sts[k].done&&!sts[k].auto;}).length;
  return {done:done, finished:!!p.finishedAt, finishedAt:p.finishedAt, startedAt:p.startedAt, curSta:p.curSta};
}
function dayWaves(){ return Object.values(WAVES).filter(function(w){return (w.jour||1)===DAY;}); }
function allTeams(){
  var out=[];
  dayWaves().forEach(function(w){ (w.athletes||[]).forEach(function(a){ out.push({id:a.id,nom:a.nom,wave:w}); }); });
  return out;
}
function fmtCountdown(ms){
  if(ms<0) ms=0; var s=Math.floor(ms/1000); var m=Math.floor(s/60); s=s%60;
  return m+':'+('0'+s).slice(-2);
}
function renderDashboard(){
  var el=document.getElementById('dashboard'); if(!el) return;
  var elKpi=document.getElementById('dashboard-kpis');
  var teams=allTeams();
  var running=0, finished=0, finTimes=[];
  teams.forEach(function(t){
    var ts=teamState(t.id);
    if(ts.finished){ finished++; if(ts.finishedAt&&ts.startedAt) finTimes.push(ts.finishedAt-ts.startedAt); }
    else if(t.wave.startAt){ running++; }
  });
  var toStart=teams.length-running-finished;
  var nPen=Object.keys(PENALTIES||{}).length;
  // temps moyen + meilleur
  var avg=finTimes.length?finTimes.reduce(function(a,b){return a+b;},0)/finTimes.length:0;
  var best=finTimes.length?Math.min.apply(null,finTimes):0;
  // équipes par station en ce moment
  var perSta={};
  teams.forEach(function(t){ var ts=teamState(t.id); if(!ts.finished && t.wave.startAt && ts.curSta!=null){ perSta[ts.curSta]=(perSta[ts.curSta]||0)+1; } });

  // ── Les COMPTEURS vont AU-DESSUS des vagues (dans dashboard-kpis) ──
  var kpi='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">';
  kpi+='<div style="background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:900;color:#10B981;font-variant-numeric:tabular-nums">'+running+'</div><div style="font-size:9px;color:var(--ink3);font-weight:700;text-transform:uppercase">en course</div></div>';
  kpi+='<div style="background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:900;color:#F59E0B;font-variant-numeric:tabular-nums">'+toStart+'</div><div style="font-size:9px;color:var(--ink3);font-weight:700;text-transform:uppercase">à venir</div></div>';
  kpi+='<div style="background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:900;color:#3B82F6;font-variant-numeric:tabular-nums">'+finished+'</div><div style="font-size:9px;color:var(--ink3);font-weight:700;text-transform:uppercase">arrivés</div></div>';
  kpi+='<div style="background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:900;color:'+(nPen?'#EF4444':'var(--ink3)')+';font-variant-numeric:tabular-nums">'+nPen+'</div><div style="font-size:9px;color:var(--ink3);font-weight:700;text-transform:uppercase">pénalités</div></div>';
  kpi+='</div>';
  if(elKpi) elKpi.innerHTML=kpi;

  // ── Le reste (stats détaillées) va EN DESSOUS des vagues ──
  var html='';

  // temps moyen / meilleur
  if(finTimes.length){
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';
    html+='<div style="background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:8px 12px;text-align:center"><div style="font-size:9px;color:var(--ink3);font-weight:700;text-transform:uppercase">⏱ temps moyen</div><div style="font-size:18px;font-weight:900;color:var(--ink);font-variant-numeric:tabular-nums">'+fmt(avg)+'</div></div>';
    html+='<div style="background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:8px 12px;text-align:center"><div style="font-size:9px;color:var(--ink3);font-weight:700;text-transform:uppercase">🏆 meilleur temps</div><div style="font-size:18px;font-weight:900;color:#F59E0B;font-variant-numeric:tabular-nums">'+fmt(best)+'</div></div>';
    html+='</div>';
  }

  // équipes par station + ALERTE JUGE (station sans juge = rouge)
  var stas=(STATIONS||[]).filter(function(s){return s.seg==='station';});
  var jSeg=(window.JUDGES&&(DAY===1?window.JUDGES.j1:window.JUDGES.j2))||{};
  if(stas.length){
    html+='<div style="font-size:11px;font-weight:900;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin:4px 0 8px">🎯 Stations · équipes &amp; juges</div>';
    html+='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:14px">';
    stas.forEach(function(s,i){
      var n=perSta[s.idx]||0;
      var jugesSta=jSeg[s.idx]||jSeg[String(s.idx)]||[];
      var nJuges=Array.isArray(jugesSta)?jugesSta.length:(jugesSta?1:0);
      var noJuge=nJuges===0;
      html+='<div style="background:'+(noJuge?'#7f1d1d33':'var(--card)')+';border:1px solid '+(noJuge?'#b91c1c':'var(--brd)')+';border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:8px">'
        +'<span style="width:8px;height:8px;border-radius:50%;background:'+(n>0?'#10B981':'#475569')+'"></span>'
        +'<span style="font-size:11px;font-weight:700;flex:1;color:var(--ink)">'+(s.nom||('Station '+(i+1)))
          +(noJuge?'<span style="color:#F87171;font-size:9px;font-weight:900"> ⚠ SANS JUGE</span>':'<span style="color:var(--ink3);font-size:9px"> · '+nJuges+' juge'+(nJuges>1?'s':'')+'</span>')
        +'</span>'
        +'<span style="font-size:12px;font-weight:900;color:'+(n>0?'#10B981':'var(--ink3)')+'">'+n+'</span>'
      +'</div>';
    });
    html+='</div>';
  }

  // ── RETARD SUR LE PLANNING (vague en cours vs heure prévue) ──
  var retard=null;
  dayWaves().forEach(function(w){
    if(w.startAt && w.schedAt){
      var r=w.startAt-w.schedAt;
      if(retard===null || Math.abs(r)>Math.abs(retard)) retard=r;
    }
  });
  if(retard!==null && Math.abs(retard)>30000){
    var enRetard=retard>0;
    html+='<div style="background:'+(enRetard?'#78350f33':'#14532d33')+';border:1px solid '+(enRetard?'#F59E0B':'#10B981')+';border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;font-weight:800;color:'+(enRetard?'#FCD34D':'#6EE7B7')+'">'
      +(enRetard?'⏰ Planning en RETARD de '+fmtCountdown(Math.abs(retard)):'✅ Planning en avance de '+fmtCountdown(Math.abs(retard)))
    +'</div>';
  }

  // ── TOTAL REPS SAISI EN DIRECT ──
  var totalReps=0;
  Object.keys(PROGRESS).forEach(function(id){
    var p=PROGRESS[id]; if(!p||!p.stations) return;
    Object.keys(p.stations).forEach(function(k){
      var st=p.stations[k]; if(st && st.val) totalReps+=parseFloat(st.val)||0;
    });
  });
  if(totalReps>0){
    html+='<div style="background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:8px 12px;text-align:center;margin-bottom:12px"><span style="font-size:10px;color:var(--ink3);font-weight:700;text-transform:uppercase">💪 Total reps saisi</span> <span style="font-size:16px;font-weight:900;color:var(--ink);margin-left:6px">'+Math.round(totalReps).toLocaleString('fr-FR')+'</span></div>';
  }

  // ── PÉNALITÉS EN DIRECT ──
  var penList=[];
  Object.keys(PENALTIES||{}).forEach(function(athId){
    var pens=PENALTIES[athId]; if(!pens) return;
    var team=teams.find(function(t){return String(t.id)===String(athId);});
    var nom=team?team.nom:athId;
    Object.keys(pens).forEach(function(pk){
      var p=pens[pk]; if(!p) return;
      penList.push({nom:nom, motif:p.motif||p.reason||'Pénalité', sec:p.seconds||p.sec||0});
    });
  });
  if(penList.length){
    html+='<div style="font-size:11px;font-weight:900;color:#F87171;text-transform:uppercase;letter-spacing:1px;margin:4px 0 8px">⚠️ Pénalités ('+penList.length+')</div>';
    html+='<div style="margin-bottom:14px">';
    penList.slice(0,8).forEach(function(p){
      html+='<div style="background:#7f1d1d22;border:1px solid #b91c1c55;border-radius:7px;padding:6px 10px;margin-bottom:4px;display:flex;align-items:center;gap:8px">'
        +'<span style="font-size:11px;font-weight:800;color:var(--ink);flex:1">'+p.nom+'</span>'
        +'<span style="font-size:10px;color:#FCA5A5">'+p.motif+'</span>'
        +(p.sec?'<span style="font-size:11px;font-weight:900;color:#F87171">+'+p.sec+'s</span>':'')
      +'</div>';
    });
    html+='</div>';
  }

  // ── CHAQUE ÉQUIPE EN DIRECT (en course) ──
  var runningTeams=teams.filter(function(t){ var ts=teamState(t.id); return !ts.finished && t.wave.startAt; });
  if(runningTeams.length){
    html+='<div style="font-size:11px;font-weight:900;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin:4px 0 8px">🏃 Équipes en course ('+runningTeams.length+')</div>';
    html+='<div style="margin-bottom:14px">';
    runningTeams.forEach(function(t){
      var ts=teamState(t.id);
      var curNom='—';
      if(ts.curSta!=null){ var cs=stas.filter(function(s){return s.idx===ts.curSta;})[0]; if(cs) curNom=cs.nom; }
      var tot=nStationsTot()||8;
      html+='<div style="background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;align-items:center;gap:8px">'
        +'<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:800;color:var(--ink)">'+t.nom+'</div>'
          +'<div style="font-size:10px;color:#F59E0B;font-weight:700">'+curNom+' · '+ts.done+'/'+tot+' stations</div></div>'
        +'<span class="chrono" data-start="'+t.wave.startAt+'" style="font-size:14px;font-weight:900;color:#10B981;font-variant-numeric:tabular-nums">'+fmt(now()-t.wave.startAt)+'</span>'
      +'</div>';
    });
    html+='</div>';
  }

  el.innerHTML=html;
}

function render(){
  renderMaster();
  renderDashboard();
  var el=document.getElementById('list');
  var arr=Object.values(WAVES).filter(function(w){return (w.jour||1)===DAY;})
    .sort(function(a,b){return (a.num||0)-(b.num||0);});
  if(!arr.length){ el.innerHTML='<div class="empty">Aucune vague publiée pour ce jour.<br>Publie depuis l\'admin (🏃 HYROX → Appliquer).</div>'; return; }
  el.innerHTML=arr.map(function(w){
    var c=w.couleur||'#3B82F6';
    var state;
    if(w.startAt){
      var elapsed=now()-w.startAt;
      var capMs=(CFG.capMinutes>0?CFG.capMinutes:0)*60000; // 0 = pas de cap
      var tkRef=tkStart()? ' <span style="font-size:10px;color:var(--ink2);font-weight:800">TK +'+fmt(w.startAt-tkStart())+'</span>':'';
      state = (capMs===0 || elapsed<capMs)
        ? '<span class="chrono" data-start="'+w.startAt+'">'+fmt(elapsed)+'</span>'+tkRef+' <button class="cancel" onclick="cancelLaunch(\''+w.key+'\')">annuler</button>'
        : '<span class="done">🏁 terminée (cap)</span>'+tkRef;
    } else {
      // ── Compte à rebours avant départ ──
      var sched=_schedForWave(w);
      var cdText='';
      if(sched!=null){
        var remain=sched-now();
        if(remain>0){
          cdText='<div class="tk-countdown" data-sched="'+sched+'" style="font-size:15px;font-weight:900;color:#F59E0B;font-variant-numeric:tabular-nums;margin-top:3px">⏳ départ dans '+fmtCountdown(remain)+'</div>';
        } else {
          cdText='<div style="font-size:11px;font-weight:900;color:#10B981;margin-top:3px">⏳ imminent…</div>';
        }
      }
      var hint=(CFG.autoStart&&w.schedAt)?'<div style="font-size:9px;color:var(--green);font-weight:800;margin-top:2px">🤖 auto à '+w.time+'</div>':'';
      state='<div style="text-align:center"><button class="go" onclick="launch(\''+w.key+'\')">🚀 GO</button>'+cdText+hint+'</div>';
    }
    return '<div class="wave" style="border-left-color:'+c+'">'
      +'<div class="top"><div class="time">'+w.time+'</div>'
      +'<span class="cat" style="color:'+c+';border-color:'+c+'55;background:'+c+'22">'+w.catNom+' '+w.wave+'/'+w.nWaves+'</span>'
      +'<div class="meta">Vague '+w.num+' · '+(w.athletes||[]).length+' partant(s)</div>'
      +state+'</div>'
      +'<div class="aths">'+(w.athletes||[]).map(function(a){return '<span class="ath">'+a.nom+'</span>';}).join('')+'</div>'
      +'</div>';
  }).join('');
}

setInterval(function(){
  var _ck=document.getElementById('tkclock');
  if(_ck){ var d=new Date(now()); _ck.textContent='🕐 '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2)+(ADJ?' ✱':'');
    _ck.style.color=ADJ?'#D97706':'var(--green,#16A34A)';
    _ck.style.background=ADJ?'rgba(217,119,6,.08)':'rgba(22,163,74,.08)';
    _ck.style.borderColor=ADJ?'rgba(217,119,6,.3)':'rgba(22,163,74,.25)';
    _ck.title=ADJ?('Calé sur le chrono officiel ('+(ADJ>0?'+':'')+Math.round(ADJ/1000)+'s vs serveur) — clique pour recaler'):'Heure officielle — clique pour caler sur le chrono pro'; }
  document.querySelectorAll('.chrono').forEach(function(n){
    n.textContent=fmt(now()-parseInt(n.dataset.start,10));
  });
  // compte à rebours avant départ des vagues
  document.querySelectorAll('.tk-countdown').forEach(function(n){
    var remain=parseInt(n.dataset.sched,10)-now();
    if(remain>0){ n.textContent='⏳ départ dans '+fmtCountdown(remain); }
    else { n.textContent='⏳ imminent…'; n.style.color='#10B981'; }
  });
},250);


/* Départs automatiques (si activés côté admin) — valeur déterministe = schedAt */
setInterval(function(){
  if(!CFG||!CFG.autoStart) return;
  if(!tkStart()) return; /* pas de départ auto sans chrono général */
  Object.values(WAVES||{}).forEach(function(w){
    if(!w.startAt && w.schedAt && now()>=w.schedAt){
      db.ref(R+'/waves/'+w.key+'/startAt').set(w.schedAt);
    }
  });
},3000);

/* ── Fiabilité terrain : indicateur réseau + anti-veille ── */
(function(){
  var dot=document.createElement('div'); dot.className='hx-net'; dot.title='Connexion Firebase';
  document.body.appendChild(dot);
  db.ref('.info/connected').on('value',function(s){
    dot.className='hx-net'+(s.val()?' on':'');
    dot.title=s.val()?'Connecté — synchro temps réel':'⚠️ Hors-ligne — les saisies partiront à la reconnexion';
  });
  var lock=null;
  function wake(){
    if(!('wakeLock' in navigator)) return;
    navigator.wakeLock.request('screen').then(function(l){ lock=l; }).catch(function(){});
  }
  document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='visible') wake(); });
  wake();
})();
</script>
<script>
/* ★ offline : cache des apps via service worker (sw.js) */
if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('sw.js').catch(function(){}); }catch(e){} }
</script>

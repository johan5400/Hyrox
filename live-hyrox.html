<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔴 Live · HYROX</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#0B1220;--card:#111C30;--brd:#1E3050;--ink:#F1F5FB;--ink2:#9FB2CC;--green:#10B981;--red:#EF4444;--amber:#F59E0B;--blue:#3B82F6}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;padding:18px}
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.hdr h1{font-size:clamp(18px,3vw,28px);font-weight:900;flex:1}
.live-dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--red);animation:pulse 1.2s infinite;margin-right:8px;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.divbtn{background:var(--card);border:1px solid var(--brd);color:var(--ink2);border-radius:10px;padding:8px 14px;font-size:12px;font-weight:900;font-family:inherit;cursor:pointer}
.divbtn.on{color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(480px,100%),1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:16px;overflow:hidden}
.card h2{font-size:15px;font-weight:900;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;margin-bottom:5px;background:#0B1626;border:1px solid var(--brd)}
.rank{min-width:30px;font-size:16px;font-weight:900;text-align:center;color:var(--ink2)}
.rank.r1{color:#FFD700}.rank.r2{color:#C0C0C0}.rank.r3{color:#CD7F32}
.nom{flex:1;font-size:clamp(13px,1.6vw,16px);font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub{font-size:10px;color:var(--ink2);font-weight:700}
.toff{font-size:clamp(14px,1.8vw,18px);font-weight:900;color:var(--green);font-variant-numeric:tabular-nums}
.dnf{color:var(--red);font-weight:900;font-size:13px}
.chrono{font-size:13px;font-weight:900;color:var(--amber);font-variant-numeric:tabular-nums;min-width:58px;text-align:right}
.pbar{flex:1;max-width:38%;height:10px;background:#060D18;border:1px solid var(--brd);border-radius:6px;overflow:hidden}
.pbar>div{height:100%;transition:width .4s}
.pct{font-size:10px;font-weight:900;color:var(--ink2);min-width:44px;text-align:right}
.empty{text-align:center;color:var(--ink2);padding:24px;font-size:12px}
.badge{font-size:9px;font-weight:900;border-radius:5px;padding:1px 6px;border:1px solid}
.foot{text-align:center;font-size:10px;color:var(--ink2);font-weight:700;margin-top:18px}
/* ── Visuels course (pastilles stations, run, damier) ── */
.segs{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.seg-dot{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:6px;font-size:9px;font-weight:900;padding:0 4px;border:1.5px solid #334155;color:#64748B;background:#0b1220}
.seg-dot.done{background:#10B981;border-color:#10B981;color:#03170e}
.seg-dot.cur{background:#F59E0B;border-color:#FCD34D;color:#1a1205;box-shadow:0 0 0 2px #F59E0B55}
.seg-run{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:900;color:#93C5FD;background:#1e3a8a44;border:1.5px solid #3B82F6;border-radius:6px;padding:0 6px;height:20px}
.seg-run.active{animation:runblink .8s ease-in-out infinite}
@keyframes runblink{0%,100%{background:#1e3a8a44;color:#93C5FD}50%{background:#3B82F6;color:#fff;box-shadow:0 0 8px #3B82F6}}
.repnow{font-size:10px;font-weight:900;color:#FCD34D;margin-left:2px}
.flag{display:inline-block;width:15px;height:15px;vertical-align:middle;margin-right:4px;
  background-image:linear-gradient(45deg,#111 25%,transparent 25%),linear-gradient(-45deg,#111 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#111 75%),linear-gradient(-45deg,transparent 75%,#111 75%);
  background-size:8px 8px;background-position:0 0,0 4px,4px -4px,-4px 0px;background-color:#fff;border-radius:2px;border:1px solid #999}
.fin-score{font-size:9px;color:#94A3B8;font-weight:700;margin-top:2px}
</style>
</head>
<body>
<div class="hdr">
  <h1><span class="live-dot"></span><span id="evnom">HYROX</span> · Live</h1>
  <div id="divbtns"></div>
</div>
<div class="grid" id="grid"><div class="empty">Connexion…</div></div>
<div class="foot" id="foot">—</div>

<script>
var FIREBASE_DB_URL='https://foc-2026-default-rtdb.europe-west1.firebasedatabase.app';
firebase.initializeApp({databaseURL:FIREBASE_DB_URL});
var db=firebase.database();
var R='hyrox/race';

var CFG=null, WAVES={}, PROGRESS={}, OFFSET=0, FILTER='all';
db.ref('.info/serverTimeOffset').on('value',function(s){ OFFSET=s.val()||0; });
var ADJ=0; // ★ calage manuel sur le chrono officiel (réglé depuis le TK, partagé via Firebase)
db.ref(R+'/clockAdj').on('value',function(s){ ADJ=parseInt(s.val(),10)||0; });
var PEN={};
db.ref(R+'/penalties').on('value',function(s){ PEN=s.val()||{}; render(); });
function penMs(id){ var e=PEN[id]; if(!e) return 0; if(e.sec!=null) return Math.max(0,parseInt(e.sec,10)||0)*1000;
  var t=0; Object.keys(e).forEach(function(k){ var v=e[k]; if(v&&v.sec!=null) t+=Math.max(0,parseInt(v.sec,10)||0)*1000; }); return t; }
function offMs(id,p){ if(!p||p.officialMs==null) return null; var o=parseInt(p.officialMs,10); return isNaN(o)?null:Math.max(0,o)+penMs(id); }
function now(){ return Date.now()+OFFSET+ADJ; }
var TK={};
db.ref(R+'/tk').on('value',function(s){ TK=s.val()||{}; });
db.ref(R+'/config').on('value',function(s){ CFG=s.val(); render(); });
db.ref(R+'/waves').on('value',function(s){ WAVES=s.val()||{}; render(); });
db.ref(R+'/progress').on('value',function(s){ PROGRESS=s.val()||{}; render(); });

function fmt(ms){
  if(ms==null) return '—';
  var s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return (h?h+':':'')+('0'+m).slice(-2)+':'+('0'+sec).slice(-2);
}
function nSegments(){ return ((CFG&&CFG.stations)||[]).filter(function(st){return st.seg==='station'||st.seg==='run';}).length; }

// ── Où en est une équipe : segments faits, segment en cours, reps en direct ──
function courseState(id){
  var segs=((CFG&&CFG.stations)||[]).filter(function(st){return st.seg==='station'||st.seg==='run';});
  var p=prog(id); var pst=(p&&p.stations)||{};
  var out=[]; var curLabel=null; var runActive=false; var repNow=null; var stIndexInStations=0;
  var stationsTotal=segs.filter(function(s){return s.seg==='station';}).length;
  for(var k=0;k<segs.length;k++){
    var s=segs[k]; var rec=pst[s.idx]; var done=!!(rec&&rec.done);
    if(s.seg==='station'){
      stIndexInStations++;
      out.push({type:'station',num:stIndexInStations,done:done,idx:s.idx,nom:s.nom});
    } else {
      out.push({type:'run',done:done,idx:s.idx});
    }
  }
  // segment "en cours" = premier non-fini ; run actif s'il suit une station finie et précède une station non finie
  var curPos=-1;
  for(var i=0;i<out.length;i++){ if(!out[i].done){ curPos=i; break; } }
  if(curPos>=0){
    var seg=out[curPos];
    if(seg.type==='run'){ runActive=true; }
    else {
      seg.current=true;
      // reps en cours sur cette station (val écrit par le juge)
      var rec2=pst[seg.idx];
      if(rec2 && rec2.val!=null){
        var target=null;
        var sdef=segs.find(function(x){return x.idx===seg.idx;});
        if(sdef){ var q=(sdef.qtyParCat&&WAVEcat(id)!=null&&sdef.qtyParCat[String(WAVEcat(id))]!=null)?sdef.qtyParCat[String(WAVEcat(id))]:sdef.qty; target=parseFloat(q)||null; }
        repNow={val:rec2.val, target:target, nom:seg.nom};
      }
    }
  }
  return {segs:out, runActive:runActive, repNow:repNow, stationsTotal:stationsTotal};
}
function WAVEcat(id){ var w=Object.values(WAVES).find(function(w){return (w.athletes||[]).some(function(a){return a.id===id;});}); return w?w.catId:null; }

// ── DÉPART AUTOMATIQUE : le live surveille l'heure et lance les vagues à schedAt ──
var _autoFired={};
setInterval(function(){
  if(!CFG || !CFG.autoStart) return;
  var t=now();
  Object.keys(WAVES||{}).forEach(function(k){
    var w=WAVES[k]; if(!w||w.startAt||!w.schedAt) return;      // déjà partie ou pas d'heure planifiée
    if(_autoFired[k]) return;                                   // déjà déclenchée localement
    if(t >= w.schedAt && t - w.schedAt < 5*60000){              // heure atteinte (fenêtre 5 min anti-rattrapage massif)
      _autoFired[k]=true;
      db.ref(R+'/waves/'+k+'/startAt').set(firebase.database.ServerValue.TIMESTAMP);
    }
  });
},1000);
function nStations(){ return ((CFG&&CFG.stations)||[]).filter(function(st){return st.seg==='station';}).length; }
function prog(id){ return (PROGRESS&&PROGRESS[id])||{}; }
function doneCount(id){ var p=prog(id); return p.stations?Object.values(p.stations).filter(function(x){return x&&x.done&&!x.auto;}).length:0; }

var EXPANDED={};
function toggleSplits(id){ EXPANDED[id]=!EXPANDED[id]; render(); }
// Détail des temps par segment (run + station) — split = elapsedMs cumulé − précédent
function splitsHTML(p){
  var segs=(CFG&&CFG.stations)||[];
  var prev=0, runTot=0, staTot=0, out='';
  segs.forEach(function(s,i){
    if(s.seg!=='run' && s.seg!=='station') return;
    var st=p.stations&&p.stations[i];
    var has=st && st.elapsedMs!=null;
    var split=has?Math.max(0, st.elapsedMs-prev):null;
    if(has) prev=st.elapsedMs;
    if(split!=null){ if(s.seg==='run') runTot+=split; else staTot+=split; }
    var isRun=(s.seg==='run');
    out+='<div style="display:flex;align-items:center;gap:8px;padding:4px 10px;font-size:11px">'
      +'<span style="width:16px;text-align:center">'+(isRun?'🏃':'🏋️')+'</span>'
      +'<span style="flex:1;color:#334155;'+(isRun?'font-style:italic;opacity:.85':'font-weight:700')+'">'+(s.nom||(isRun?'Run':'Station'))+'</span>'
      +'<span style="font-variant-numeric:tabular-nums;font-weight:800;color:'+(isRun?'#2563EB':'#0F172A')+'">'+(split!=null?fmt(split):'—')+'</span>'
      +'</div>';
  });
  return '<div style="background:#F8FAFC;border-radius:0 0 10px 10px;padding:8px 4px 4px;margin:-2px 0 8px">'+out
    +'<div style="display:flex;gap:10px;padding:8px 12px 2px;border-top:1px solid #E2E8F0;margin-top:4px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#64748B">'
    +'<span style="flex:1">🏃 Runs '+fmt(runTot)+'</span><span>🏋️ Stations '+fmt(staTot)+'</span></div></div>';
}

function setFilter(f){ FILTER=f; render(); }

function render(){
  var grid=document.getElementById('grid');
  if(!CFG){ grid.innerHTML='<div class="empty">En attente de la publication de la course…</div>'; return; }
  document.getElementById('evnom').textContent=CFG.nom||'HYROX';

  // boutons divisions
  var divs=Object.values(CFG.divisions||{}).sort(function(a,b){return (a.id||0)-(b.id||0);});
  document.getElementById('divbtns').innerHTML =
    '<button class="divbtn'+(FILTER==='all'?' on':'')+'" style="'+(FILTER==='all'?'background:#3B82F6;border-color:#3B82F6':'')+'" onclick="setFilter(\'all\')">Toutes</button> '
    + divs.map(function(d){
      var on=FILTER===String(d.id);
      return '<button class="divbtn'+(on?' on':'')+'" style="'+(on?'background:'+d.couleur+';border-color:'+d.couleur:'color:'+d.couleur)+'" onclick="setFilter(\''+d.id+'\')">'+d.nom+'</button>';
    }).join(' ');

  var total=nSegments();
  var byDiv={};
  Object.values(WAVES).forEach(function(w){
    if(FILTER!=='all' && String(w.catId)!==FILTER) return;
    if(!w.startAt) return;
    if(!byDiv[w.catId]) byDiv[w.catId]={nom:w.catNom,couleur:w.couleur,finished:[],running:[]};
    (w.athletes||[]).forEach(function(a){
      var p=prog(a.id);
      var item={id:a.id,nom:a.nom,waveNum:w.num,startAt:w.startAt,p:p,done:doneCount(a.id)};
      if(p.finishedAt) byDiv[w.catId].finished.push(item);
      else byDiv[w.catId].running.push(item);
    });
  });

  var keys=Object.keys(byDiv);
  if(!keys.length){ grid.innerHTML='<div class="empty">Aucune vague lancée pour l\'instant.</div>'; return; }

  grid.innerHTML=keys.map(function(k){
    var d=byDiv[k];
    d.finished.sort(function(a,b){ return (a.p.dnf?9e13:(offMs(a.id,a.p)||9e12))-(b.p.dnf?9e13:(offMs(b.id,b.p)||9e12)); });
    d.running.sort(function(a,b){ return b.done-a.done || a.waveNum-b.waveNum; });
    var rows='';
    d.finished.forEach(function(t,i){
      var r=i+1;
      var open=!t.p.dnf && EXPANDED[t.id];
      var flag=t.p.dnf?'':'<span class="flag" title="Arrivée"></span>';
      rows+='<div class="row"'+(t.p.dnf?'':' style="cursor:pointer" onclick="toggleSplits(\''+t.id+'\')"')+'><div class="rank'+(r<=3&&!t.p.dnf?' r'+r:'')+'">'+(t.p.dnf?'—':r)+'</div>'
        +'<div class="nom">'+flag+t.nom+'<div class="sub">vague '+t.waveNum+(t.p.dnf?'':' · terminé · touche pour le détail')+'</div>'
        +(t.p.dnf?'':'<div class="fin-score">'+doneCount(t.id)+'/'+nStations()+' stations validées'+(penMs(t.id)?' · pénalité +'+Math.round(penMs(t.id)/1000)+'s':'')+'</div>')
        +'</div>'
        +(t.p.dnf?'<span class="dnf">DNF</span>':'<span class="toff">'+fmt(offMs(t.id,t.p))+(penMs(t.id)?'<span style="font-size:9px;color:#F87171;font-weight:900"> +pén.</span>':'')+' <span style="opacity:.45;font-size:10px">'+(open?'▲':'▼')+'</span></span>')
        +'</div>';
      if(open) rows+=splitsHTML(t.p);
    });
    d.running.forEach(function(t){
      var pct=total?Math.round(t.done/total*100):0;
      var cs=courseState(t.id);
      var dots=cs.segs.map(function(sg){
        if(sg.type==='run'){
          var act=cs.runActive && !sg.done && cs.segs.filter(function(x){return x.type==='run'&&!x.done;})[0]===sg;
          return '<span class="seg-run'+(act?' active':'')+'">🏃'+(act?' RUN':'')+'</span>';
        }
        return '<span class="seg-dot'+(sg.done?' done':(sg.current?' cur':''))+'">'+sg.num+'</span>';
      }).join('');
      var repTxt='';
      if(cs.repNow){ repTxt='<span class="repnow">'+cs.repNow.val+(cs.repNow.target?('/'+cs.repNow.target):'')+' '+(cs.repNow.nom||'')+'</span>'; }
      rows+='<div class="row" style="border-left:3px solid '+d.couleur+';flex-wrap:wrap">'
        +'<div class="rank">'+(cs.runActive?'🏃':'🏋️')+'</div>'
        +'<div class="nom" style="flex:1">'+t.nom
          +'<div class="sub">vague '+t.waveNum+' · '+t.done+'/'+cs.stationsTotal+' stations'+repTxt+'</div>'
          +'<div class="segs">'+dots+'</div>'
        +'</div>'
        +'<span class="chrono" data-start="'+t.startAt+'" style="align-self:flex-start">'+fmt(now()-t.startAt)+'</span>'
        +'</div>';
    });
    return '<div class="card"><h2><span class="badge" style="color:'+d.couleur+';border-color:'+d.couleur+'55;background:'+d.couleur+'22">'+d.nom+'</span>'
      +'<span class="sub">'+d.finished.filter(function(t){return !t.p.dnf;}).length+' arrivés · '+d.running.length+' en course</span></h2>'
      +(rows||'<div class="empty">—</div>')+'</div>';
  }).join('');

  document.getElementById('foot').textContent='Cap '+(CFG.capMinutes||100)+' min · mise à jour temps réel';
}

setInterval(function(){
  document.querySelectorAll('.chrono[data-start]').forEach(function(n){
    n.textContent=fmt(now()-parseInt(n.dataset.start,10));
  });
},500);

/* Départs automatiques (si activés côté admin) — valeur déterministe = schedAt */
setInterval(function(){
  if(!CFG||!CFG.autoStart) return;
  if(!((TK[1]&&TK[1].startAt)||(TK[2]&&TK[2].startAt))) return;
  Object.values(WAVES||{}).forEach(function(w){
    if(!w.startAt && w.schedAt && now()>=w.schedAt){
      db.ref(R+'/waves/'+w.key+'/startAt').set(w.schedAt);
    }
  });
},3000);
</script>
<script>
/* ★ offline : cache des apps via service worker (sw.js) */
if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('sw.js').catch(function(){}); }catch(e){} }

/* ── ANTI-VEILLE : l'écran géant ne doit JAMAIS s'endormir (départs auto) ── */
(function(){
  var wl=null;
  function acquire(){
    if('wakeLock' in navigator){
      navigator.wakeLock.request('screen').then(function(l){ wl=l; l.addEventListener('release',function(){ wl=null; }); }).catch(function(){});
    }
  }
  acquire();
  document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='visible') acquire(); });
  // Réacquisition périodique (certains navigateurs relâchent)
  setInterval(acquire, 30000);
})();
</script>
</body>
</html>
